name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - "android-fpv-viewer/**"
      - ".github/workflows/android-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and build tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        run: |
          GRADLE_VER=8.7
          wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip" -O /tmp/gradle.zip
          unzip -q -d /tmp /tmp/gradle.zip
          echo "GRADLE_HOME=/tmp/gradle-${GRADLE_VER}" >> $GITHUB_ENV
          echo "/tmp/gradle-${GRADLE_VER}/bin" >> $GITHUB_PATH

      - name: Build debug APK
        run: cd android-fpv-viewer && gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rc-fpv-viewer-debug-apk
          path: android-fpv-viewer/app/build/outputs/apk/debug/app-debug.apk

name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - "android-fpv-viewer/**"
      - ".github/workflows/android-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and build tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        run: |
          GRADLE_VER=8.7
          wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip" -O /tmp/gradle.zip
          unzip -q -d /tmp /tmp/gradle.zip
          echo "GRADLE_HOME=/tmp/gradle-${GRADLE_VER}" >> $GITHUB_ENV
          echo "/tmp/gradle-${GRADLE_VER}/bin" >> $GITHUB_PATH

      - name: Build debug APK
        run: cd android-fpv-viewer && gradle assembleDebug --no-daemon -PgithubRepo=${{ github.repository }}

      - name: Get version for release tag
        id: version
        run: |
          VERSION=$(sed -n 's/.*versionName "\([^"]*\)".*/\1/p' android-fpv-viewer/app/build.gradle | head -1)
          [ -z "$VERSION" ] && VERSION=1.0
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=apk-$VERSION-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: RC FPV Viewer ${{ steps.version.outputs.version }}
          files: android-fpv-viewer/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rc-fpv-viewer-debug-apk
          path: android-fpv-viewer/app/build/outputs/apk/debug/app-debug.apk
